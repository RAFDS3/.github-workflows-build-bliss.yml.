name: Build Bliss OS 17 (Android 14)

on:
  workflow_dispatch: # Memungkinkan Anda menjalankan build secara manual dari tab Actions

jobs:
  build-os:
    runs-on: ubuntu-latest
    steps:
    - name: Free Disk Space (Cleanup Server)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: false # Jangan hapus SDK karena build Android membutuhkannya
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Configure Git
      run: |
        git config --global user.name "Bliss Builder"
        git config --global user.email "builder@blissos.org"

    - name: Initialize and Sync Bliss OS 17 Source
      run: |
        mkdir -p ~/blissos
        cd ~/blissos
        # Inisialisasi manifest Bliss OS 17 (Android 14)
        repo init -u https://github.com -b bliss-v17.x --depth=1
        # Sinkronisasi kode sumber (hanya mengambil commit terakhir untuk menghemat ruang disk)
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Build Bliss OS 17
      run: |
        cd ~/blissos
        source build/envsetup.sh
        # Memilih target perangkat umum x86_64 dengan varian userdebug
        lunch bliss_x86_64-userdebug
        # Memulai proses kompilasi menjadi file ISO
        mka iso_img -j$(nproc --all)

    - name: Upload ISO Result
      uses: actions/upload-artifact@v4
      with:
        name: BlissOS-17-ISO
        path: ~/blissos/out/target/product/x86_64/*.iso
        if-no-files-found: error
